[colors]
bg = #181818
fg = #F1F1F1
mb = #222222

trans = #00000000
white = #FFFFFF
black = #000000

red = #f7768e
pink = #FF0677
purple = #583794
blue = #7aa2f7
blue-arch = #0A9CF5
cyan = #4DD0E1
teal = #00B19F
green = #9ece6a
lime = #B9C244
yellow = #e0af68
amber = #FBC02D
orange = #E57C46
brown = #AC8476
grey = #8C8C8C
indigo = #6C77BB
blue-gray = #6D8895

#--------------------Polybar------------------#

[global/wm]

margin-bottom = 0
margin-top = 0

[bar/mrrevillod]

wm-restack = bspwm
enable-ipc = true

cursor-click = pointer

monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 98.6%
height = 20

offset-x = 0.69%
offset-y = 1%

background = ${colors.bg}
foreground = ${colors.fg}

radius = 4.0

line-size = 2
line-color = ${colors.blue}

border-size = 8px
border-color = ${colors.bg}

padding = 1

module-margin-left = 0
module-margin-right = 0

; Text
font-0 = "JetBrainsMono:style=Bold:pixelsize=9;3"
; Icons
font-1 = "Font Awesome 6 Free Solid:size=10;3"
font-2 = "Material Design Icons Desktop:size=11;3"
font-3 = "Material Design Icons Desktop:size=15;5"
; Glyphs
font-4 = "MesloLGS NF:style=Regular:size=15;4"

font-5 = "Iosevka Term:pixelsize=13;4"
font-6 = "Iosevka Term:pixelsize=6;1"
font-7 = "Hack Nerd Font"

;dpi = 96

modules-left = bspwm-icons
modules-right = bi network uni pulseaudio uni battery uni date bd

spacing = 0
separator =
dim-value = 1.0

;;locale = es_MX.UTF-8

tray-position = right
tray-detached = false
tray-maxsize = 16
tray-background = ${colors.bg}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0

[settings]

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false
 

#--------------------MODULES------------------#

[module/bi]
type                        = custom/text
content                     = "%{T5}¯éÂ%{T-}"
content-foreground          = ${colors.mb}
content-background          = ${colors.bg}

[module/uni]
type                        = custom/text
content                     = "%{T5}ÔÇÄ %{T-}"
content-foreground          = ${colors.mb}
content-background          = ${colors.mb}

[module/bd]
type                        = custom/text
content                     = "%{T5}¯é┤%{T-}"
content-foreground          = ${colors.mb}
content-background          = ${colors.bg}

[module/sep]
type = custom/text
content = " "
content-foreground = ${colors.bg}



######################################################

[module/date]
type = internal/date

interval = 1.0

time = %I:%M %P
format-background = ${colors.mb}
format-foreground = ${colors.fg}
date-alt = " %A, %d %B %Y"

format = <label>
format-prefix-font = 2
format-prefix-background = ${colors.mb}
format-prefix-foreground = ${colors.white}

label =%date%%time%

######################################################

[module/network]
type = internal/network
interface = wlp0s20f3

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = %{A1: bash "./wifi.sh":}<ramp-signal>%{A}
#format-connected-prefix = "´ç½ "

ramp-signal-0 = ¾░ñ»
ramp-signal-1 = ¾░ñƒ
ramp-signal-2 = ¾░ñó
ramp-signal-3 = ¾░ñÑ
ramp-signal-4 = ¾░ñ¿
ramp-signal-5 = ¾░ñ¿

format-connected-background = ${colors.mb}
format-connected-foreground = ${colors.white}

label-connected-background = ${colors.mb}
label-connected-foreground = ${colors.white}

format-disconnected = %{A1: bash "./rofi-wifi.sh":}<label-disconnected>%{A}
format-disconnected-prefix = "¾░ñ« "

format-disconnected-prefix-background = ${colors.mb}
format-disconnected-foreground = ${colors.red}

label-disconnected-background = ${colors.mb}
label-disconnected-foreground = ${colors.red}

format-packetloss = %{A1: bash "./rofi-wifi.sh":}<animation-packetloss>%{A}
animation-packetloss-0 = ¾░ñ½
animation-packetloss-1 = ¾░ñª
format-packetloss-background = ${colors.mb}
format-packetloss-foreground = ${colors.orange}
; Framerate in milliseconds
animation-packetloss-framerate = 500


######################################################

[module/pulseaudio]
type = internal/pulseaudio

;;sink = alsa_output.pci-0000_00_1b.0.analog-stereo
use-ui-max = true
interval = 5

format-volume = <ramp-volume>

format-volume-foreground = ${colors.white}
format-volume-background = ${colors.mb}

label-muted = ´Ü® muted
label-muted-foreground = ${colors.grey}

ramp-volume-foreground = ${colors.white}
ramp-volume-0 = ´Çª
ramp-volume-1 = ´Çº
ramp-volume-2 = ´Çº
ramp-volume-3 = ´Ç¿
ramp-volume-4 = ´Ç¿

; Right and Middle click
click-right = pavucontrol


######################################################

[module/battery]
type = internal/battery
full-at = 100
battery = BAT1
adapter = ACAD
poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging><label-charging>
label-charging = " %percentage%%"
label-charging-background = ${colors.mb}

format-discharging = <ramp-capacity><label-discharging>
label-discharging = " %percentage%%"
format-discharging-prefix-font = 3
label-discharging-background = ${colors.mb}

format-full = <label-full>
format-full-prefix = "¾░ü╣"
format-full-prefix-font = 2
format-full-prefix-foreground = ${colors.white}
format-full-prefix-background = ${colors.mb}
label-full = "%percentage%%"
label-full-background = ${colors.mb}

ramp-capacity-0 = ¾░éâ
ramp-capacity-1 = ¾░ü╗
ramp-capacity-2 = ¾░ü¥
ramp-capacity-3 = ¾░éÇ
ramp-capacity-4 = ¾░éé
ramp-capacity-foreground = ${colors.white}
ramp-capacity-background = ${colors.mb}
ramp-capacity-font = 2

animation-charging-0 = ¾░éå
animation-charging-1 = ¾░éç
animation-charging-2 = ¾░éë
animation-charging-3 = ¾░éè
animation-charging-4 = ¾░éà
animation-charging-foreground = ${colors.white}
animation-charging-background = ${colors.mb}
animation-charging-font = 2
animation-charging-framerate = 700

#######################################################

[module/bspwm-circles]
type = internal/bspwm

enable-click = true
enable-scroll = true
reverse-scroll = true
pin-workspaces = true
occupied-scroll = false


format = <label-state>
format-font = 3

label-focused = ¾░Çÿ
label-focused-background = ${colors.mb}
label-focused-padding = 1
label-focused-foreground = ${colors.white}

label-occupied = ¾░âÜ
label-occupied-padding = 1
label-occupied-background = ${colors.mb}
label-occupied-foreground= ${colors.grey}

label-urgent = %icon%
label-urgent-padding = 0

label-empty = ¾░Øª
label-empty-foreground = ${colors.grey}
label-empty-padding = 1
label-empty-background = ${colors.mb}



##############################################################

[module/bspwm-icons]
type = internal/bspwm

pin-workspaces = true

inline-mode = false
enable-click = true

enable-scroll = true

reverse-scroll = false

fuzzy-match = true

ws-icon-0 = "I;%{T1} ¯×ò %{T-}"
ws-icon-1 = "II;%{T1} ´ë® %{T-}"
ws-icon-2 = "III;%{T1} ´äª%{T-}"
ws-icon-3 = "IV;%{T1} ¯ÿ× %{T-}"
ws-icon-4 = "V;%{T1} ¯ÿå %{T-}"
ws-icon-5 = "VI;%{T1} ¯×¿ %{T-}"
ws-icon-6 = "VII;%{T1} ¯ÿî %{T-}"
ws-icon-7 = "VIII;%{T1} ¯×ó %{T-}"
ws-icon-8 = "IX;%{T1} ¯×ó %{T-}"
ws-icon-9 = "X;%{T1} ¯×ó %{T-}"
ws-icon-default = %{T1} ¯×ó %{T-}

format = <label-state> <label-mode>
label-dimmed-foreground = #7a7a7a ; Change this to the desired color value
label-dimmed-underline = ${bar/top.background}
label-dimmed-focused-background = #161616

label-monitor = %name%

; Available tokens:
label-focused = %icon%
label-focused-foreground = ${colors.focus-dark}
label-focused-background = ${colors.fg-blue}
label-focused-underline = #5260bf

; Available tokens:
label-occupied = %icon%
label-occupied-padding = 0
label-occupied-foreground = ${colors.fg-blue}

; Available tokens:
label-urgent = %icon%
label-urgent-foreground = ${colors.red}

; Available tokens:
label-empty = %icon%
label-empty-foreground = #55
label-empty-padding = 0

; Separator in between workspaces
label-separator = "      "
label-separator-padding = 0
label-separator-foreground = #ffb52a

